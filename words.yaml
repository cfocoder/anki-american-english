deck:
  name: American English Pronunciation - Starter Words
  variant: en-US
  voice: en-US-JennyNeural
  description: American English vocabulary cards with normal and slower pronunciation audio.
words:
  - word: routes
    ipa: /ruːts/; also /raʊts/ in AmE
    meaning_es: rutas; caminos; rutas de red
    example_en: The packets follow different routes through the network.
    example_es: Los paquetes siguen diferentes rutas a través de la red.
    note: In American English, both pronunciations exist. In networking/tech, /ruːts/ is very common.

  - word: vulnerability
    ipa: /ˌvʌlnərəˈbɪləti/
    meaning_es: vulnerabilidad
    example_en: The report found a serious vulnerability in the application.
    example_es: El reporte encontró una vulnerabilidad grave en la aplicación.

  - word: unfortunately
    ipa: /ʌnˈfɔːrtʃənətli/
    meaning_es: desafortunadamente
    example_en: Unfortunately, the server was unavailable during the test.
    example_es: Desafortunadamente, el servidor no estuvo disponible durante la prueba.

  - word: versatile
    ipa: /ˈvɜːrsətl/
    meaning_es: versátil
    example_en: Python is a versatile language for data analysis.
    example_es: Python es un lenguaje versátil para análisis de datos.

  - word: fortunately
    ipa: /ˈfɔːrtʃənətli/
    meaning_es: afortunadamente
    example_en: Fortunately, we had a recent backup.
    example_es: Afortunadamente, teníamos un respaldo reciente.

  - word: literally
    ipa: /ˈlɪtərəli/
    meaning_es: literalmente
    example_en: The script literally deletes every temporary file.
    example_es: El script literalmente elimina cada archivo temporal.

  - word: literature
    ipa: /ˈlɪtərətʃər/
    meaning_es: literatura; bibliografía académica
    example_en: The literature suggests several ways to evaluate language models.
    example_es: La literatura sugiere varias formas de evaluar modelos de lenguaje.

  - word: infectious
    ipa: /ɪnˈfekʃəs/
    meaning_es: infeccioso; contagioso
    example_en: The disease is highly infectious.
    example_es: La enfermedad es altamente infecciosa.

  - word: particularly
    ipa: /pərˈtɪkjələrli/
    meaning_es: particularmente; especialmente
    example_en: This approach is particularly useful for small datasets.
    example_es: Este enfoque es particularmente útil para conjuntos de datos pequeños.

  - word: antigravity
    ipa: /ˌæntiˈɡrævəti/
    meaning_es: antigravedad
    example_en: The story imagines a machine with antigravity technology.
    example_es: La historia imagina una máquina con tecnología de antigravedad.

  - word: comfortable
    ipa: /ˈkʌmftərbəl/
    meaning_es: cómodo; confortable
    example_en: Make sure you are comfortable before the long meeting starts.
    example_es: Asegúrate de estar cómodo antes de que empiece la reunión larga.

  - word: originally
    ipa: /əˈrɪdʒənəli/
    meaning_es: originalmente
    example_en: The project was originally designed for internal use.
    example_es: El proyecto fue diseñado originalmente para uso interno.

  - word: either
    ipa: /ˈiːðər/; also /ˈaɪðər/
    meaning_es: cualquiera de los dos; tampoco (con not)
    example_en: Either option would work for this prototype.
    example_es: Cualquiera de las dos opciones funcionaría para este prototipo.
    note: Both /ˈiːðər/ and /ˈaɪðər/ are accepted in American English.

  - word: organization
    ipa: /ˌɔːrɡənəˈzeɪʃən/
    meaning_es: organización
    example_en: The organization publishes open datasets every month.
    example_es: La organización publica datos abiertos cada mes.

  - word: profitable
    ipa: /ˈprɑːfɪtəbəl/
    meaning_es: rentable; lucrativo
    example_en: The company became profitable after two years.
    example_es: La empresa se volvió rentable después de dos años.

  - word: despicable
    ipa: /dɪˈspɪkəbəl/
    meaning_es: despreciable
    example_en: The character made a despicable decision.
    example_es: El personaje tomó una decisión despreciable.

  - word: delusional
    ipa: /dɪˈluːʒənəl/
    meaning_es: delirante; fuera de la realidad
    example_en: It would be delusional to ignore the evidence.
    example_es: Sería delirante ignorar la evidencia.

  - word: doubt
    ipa: /daʊt/
    meaning_es: duda; dudar
    example_en: I doubt the model can answer that without context.
    example_es: Dudo que el modelo pueda responder eso sin contexto.
    note: The b is silent.

  - word: utterly
    ipa: /ˈʌtərli/
    meaning_es: completamente; absolutamente
    example_en: The explanation was utterly convincing.
    example_es: La explicación fue completamente convincente.

  - word: brought
    ipa: /brɔːt/
    meaning_es: trajo; traído
    example_en: She brought her notes to the workshop.
    example_es: Ella trajo sus notas al taller.

  - word: obliterate
    ipa: /əˈblɪtəreɪt/
    meaning_es: destruir por completo; borrar
    example_en: The command can obliterate the entire directory.
    example_es: El comando puede destruir por completo todo el directorio.

  - word: unhinged
    ipa: /ʌnˈhɪndʒd/
    meaning_es: desquiciado; fuera de control
    example_en: The comment sounded completely unhinged.
    example_es: El comentario sonó completamente desquiciado.

  - word: jewelry
    ipa: /ˈdʒuːəlri/
    meaning_es: joyería; alhajas
    example_en: She keeps her jewelry in a small wooden box.
    example_es: Ella guarda su joyería en una pequeña caja de madera.

  - word: depth
    ipa: /depθ/
    meaning_es: profundidad
    example_en: The analysis lacks depth.
    example_es: El análisis carece de profundidad.

  - word: undeniable
    ipa: /ˌʌndɪˈnaɪəbəl/
    meaning_es: innegable; indudable
    example_en: The evidence is undeniable.
    example_es: La evidencia es innegable.

  - word: know
    ipa: "/noʊ/"
    meaning_es: "saber; conocer"
    example_en: "I know the answer to that question."
    example_es: "Sé la respuesta a esa pregunta."
    note: "The k is silent; pronounce it like “no.”"

  - word: knife
    ipa: "/naɪf/"
    meaning_es: "cuchillo"
    example_en: "Use a sharp knife to cut the bread."
    example_es: "Usa un cuchillo afilado para cortar el pan."
    note: "The k is silent."

  - word: knee
    ipa: "/niː/"
    meaning_es: "rodilla"
    example_en: "He hurt his knee while running."
    example_es: "Se lastimó la rodilla mientras corría."
    note: "The k is silent."

  - word: knock
    ipa: "/nɑːk/"
    meaning_es: "tocar la puerta; golpe"
    example_en: "Please knock before you enter the room."
    example_es: "Por favor toca antes de entrar al cuarto."
    note: "The k is silent."

  - word: write
    ipa: "/raɪt/"
    meaning_es: "escribir"
    example_en: "I write notes after every meeting."
    example_es: "Escribo notas después de cada reunión."
    note: "The w is silent."

  - word: wrong
    ipa: "/rɔːŋ/"
    meaning_es: "incorrecto; equivocado"
    example_en: "That number is wrong."
    example_es: "Ese número está incorrecto."
    note: "The w is silent."

  - word: wrist
    ipa: "/rɪst/"
    meaning_es: "muñeca (parte del cuerpo)"
    example_en: "My wrist hurts after typing all day."
    example_es: "Me duele la muñeca después de escribir todo el día."
    note: "The w is silent."

  - word: answer
    ipa: "/ˈænsər/"
    meaning_es: "respuesta; responder"
    example_en: "The answer is on the next page."
    example_es: "La respuesta está en la siguiente página."
    note: "The w is silent."

  - word: sword
    ipa: "/sɔːrd/"
    meaning_es: "espada"
    example_en: "The knight carried a silver sword."
    example_es: "El caballero llevaba una espada plateada."
    note: "The w is silent."

  - word: two
    ipa: "/tuː/"
    meaning_es: "dos"
    example_en: "She has two cats."
    example_es: "Ella tiene dos gatos."
    note: "The w is silent."

  - word: whole
    ipa: "/hoʊl/"
    meaning_es: "entero; completo"
    example_en: "Read the whole sentence before answering."
    example_es: "Lee la oración completa antes de responder."
    note: "The w is silent."

  - word: who
    ipa: "/huː/"
    meaning_es: "quién"
    example_en: "Who called you this morning?"
    example_es: "¿Quién te llamó esta mañana?"
    note: "The w is silent; start with an h sound."

  - word: honest
    ipa: "/ˈɑːnɪst/"
    meaning_es: "honesto; sincero"
    example_en: "Please give me an honest opinion."
    example_es: "Por favor dame una opinión honesta."
    note: "The h is silent."

  - word: hour
    ipa: "/ˈaʊər/"
    meaning_es: "hora"
    example_en: "The meeting lasted one hour."
    example_es: "La reunión duró una hora."
    note: "The h is silent."

  - word: honor
    ipa: "/ˈɑːnər/"
    meaning_es: "honor; honrar"
    example_en: "It is an honor to work with this team."
    example_es: "Es un honor trabajar con este equipo."
    note: "The h is silent."

  - word: heir
    ipa: "/er/"
    meaning_es: "heredero; heredera"
    example_en: "She is the heir to the family business."
    example_es: "Ella es la heredera del negocio familiar."
    note: "The h is silent."

  - word: rhyme
    ipa: "/raɪm/"
    meaning_es: "rima; rimar"
    example_en: "Time and rhyme sound similar."
    example_es: "Time y rhyme suenan parecido."
    note: "The h is silent."

  - word: rhythm
    ipa: "/ˈrɪðəm/"
    meaning_es: "ritmo"
    example_en: "This song has a steady rhythm."
    example_es: "Esta canción tiene un ritmo constante."
    note: "The h is silent."

  - word: debt
    ipa: "/det/"
    meaning_es: "deuda"
    example_en: "The company paid its debt early."
    example_es: "La empresa pagó su deuda antes de tiempo."
    note: "The b is silent."

  - word: lamb
    ipa: "/læm/"
    meaning_es: "cordero"
    example_en: "The lamb followed its mother."
    example_es: "El cordero siguió a su madre."
    note: "The b is silent."

  - word: climb
    ipa: "/klaɪm/"
    meaning_es: "subir; escalar"
    example_en: "They climb the hill every weekend."
    example_es: "Ellos suben la colina cada fin de semana."
    note: "The b is silent."

  - word: thumb
    ipa: "/θʌm/"
    meaning_es: "pulgar"
    example_en: "Press the button with your thumb."
    example_es: "Presiona el botón con el pulgar."
    note: "The b is silent."

  - word: comb
    ipa: "/koʊm/"
    meaning_es: "peine; peinar"
    example_en: "She keeps a comb in her bag."
    example_es: "Ella guarda un peine en su bolsa."
    note: "The b is silent."

  - word: listen
    ipa: "/ˈlɪsən/"
    meaning_es: "escuchar"
    example_en: "Listen carefully to the pronunciation."
    example_es: "Escucha con atención la pronunciación."
    note: "The t is silent."

  - word: castle
    ipa: "/ˈkæsəl/"
    meaning_es: "castillo"
    example_en: "The old castle is near the river."
    example_es: "El castillo antiguo está cerca del río."
    note: "The t is silent."

  - word: Christmas
    ipa: "/ˈkrɪsməs/"
    meaning_es: "Navidad"
    example_en: "We visit our family at Christmas."
    example_es: "Visitamos a nuestra familia en Navidad."
    note: "The t is silent."

  - word: soften
    ipa: "/ˈsɔːfən/"
    meaning_es: "suavizar; ablandar"
    example_en: "Warm water can soften the butter."
    example_es: "El agua tibia puede ablandar la mantequilla."
    note: "The t is usually silent in American English."

  - word: island
    ipa: "/ˈaɪlənd/"
    meaning_es: "isla"
    example_en: "The island has beautiful beaches."
    example_es: "La isla tiene playas hermosas."
    note: "The s is silent."

  - word: aisle
    ipa: "/aɪl/"
    meaning_es: "pasillo"
    example_en: "The cereal is in the next aisle."
    example_es: "El cereal está en el siguiente pasillo."
    note: "The s is silent."

  - word: should
    ipa: "/ʃʊd/"
    meaning_es: "debería; deberías"
    example_en: "You should practice these words out loud."
    example_es: "Deberías practicar estas palabras en voz alta."
    note: "The l is silent."

  - word: often
    ipa: "/ˈɔːfən/; also /ˈɔːftən/"
    meaning_es: "a menudo; frecuentemente"
    example_en: "I often review new words before breakfast."
    example_es: "A menudo repaso palabras nuevas antes del desayuno."
    note: "The t is often silent in American English; /ˈɔːfən/ is very common."

  - word: fasten
    ipa: "/ˈfæsən/"
    meaning_es: "abrochar; sujetar"
    example_en: "Please fasten your seat belt."
    example_es: "Por favor abróchate el cinturón de seguridad."
    note: "The t is silent."

  - word: hasten
    ipa: "/ˈheɪsən/"
    meaning_es: "apresurarse; acelerar"
    example_en: "We should not hasten the decision."
    example_es: "No deberíamos apresurar la decisión."
    note: "The t is silent."

  - word: moisten
    ipa: "/ˈmɔɪsən/"
    meaning_es: "humedecer"
    example_en: "Moisten the cloth before cleaning the screen."
    example_es: "Humedece el paño antes de limpiar la pantalla."
    note: "The t is silent."

  - word: glisten
    ipa: "/ˈɡlɪsən/"
    meaning_es: "brillar; relucir"
    example_en: "The streets glisten after the rain."
    example_es: "Las calles brillan después de la lluvia."
    note: "The t is silent."

  - word: whistle
    ipa: "/ˈwɪsəl/"
    meaning_es: "silbato; silbar"
    example_en: "The referee blew the whistle."
    example_es: "El árbitro tocó el silbato."
    note: "The t is silent."

  - word: wrestle
    ipa: "/ˈresəl/"
    meaning_es: "luchar; forcejear"
    example_en: "They wrestle with difficult grammar rules."
    example_es: "Ellos batallan con reglas gramaticales difíciles."
    note: "The t is silent. The w is also silent."

  - word: mortgage
    ipa: "/ˈmɔːrɡɪdʒ/"
    meaning_es: "hipoteca"
    example_en: "They applied for a mortgage last week."
    example_es: "Solicitaron una hipoteca la semana pasada."
    note: "The t is silent."

  - word: rapport
    ipa: "/ræˈpɔːr/"
    meaning_es: "buena relación; conexión"
    example_en: "The teacher built rapport with the students."
    example_es: "El maestro creó una buena relación con los estudiantes."
    note: "The final t is silent."

  - word: depot
    ipa: "/ˈdiːpoʊ/"
    meaning_es: "depósito; estación; almacén"
    example_en: "The package arrived at the depot this morning."
    example_es: "El paquete llegó al depósito esta mañana."
    note: "The final t is silent."

  - word: sovereignty
    ipa: "/ˈsɑːvrənti/"
    meaning_es: "soberanía"
    example_en: "The country defended its sovereignty."
    example_es: "El país defendió su soberanía."
    note: "The e after v is silent in the common American pronunciation; say it like “SAH-vruhn-tee.”"

  - word: turtle
    ipa: "/ˈtɝːtəl/"
    meaning_es: "tortuga"
    example_en: "The turtle moved slowly across the road."
    example_es: "La tortuga cruzó lentamente la carretera."
    note: "The final e is silent; it only affects the spelling, not the sound."

  - word: awkward
    ipa: "/ˈɔːkwərd/"
    meaning_es: "incómodo; torpe; raro"
    example_en: "The first conversation felt awkward."
    example_es: "La primera conversación se sintió incómoda."
    note: "The w after a is not pronounced as a separate /w/ sound in common American pronunciation."

  - word: yacht
    ipa: "/jɑːt/"
    meaning_es: "yate"
    example_en: "They rented a yacht for the weekend."
    example_es: "Rentaron un yate para el fin de semana."
    note: "The ch is silent; pronounce it like “yaht.”"

  - word: debris
    ipa: "/dəˈbriː/"
    meaning_es: "escombros; restos"
    example_en: "The storm left debris in the street."
    example_es: "La tormenta dejó escombros en la calle."
    note: "The final s is silent."

  - word: Arkansas
    ipa: "/ˈɑːrkənsɔː/"
    meaning_es: "Arkansas"
    example_en: "Arkansas is a state in the southern United States."
    example_es: "Arkansas es un estado del sur de Estados Unidos."
    note: "The final s is silent; pronounce the ending like “saw.”"

  - word: phenomenon
    ipa: "/fəˈnɑːməˌnɑːn/"
    meaning_es: "fenómeno"
    example_en: "The researchers studied the phenomenon carefully."
    example_es: "Los investigadores estudiaron el fenómeno cuidadosamente."
    note: "The ph sounds like /f/; do not pronounce it as /p/ + /h/."

  - word: Connecticut
    ipa: "/kəˈnetɪkət/"
    meaning_es: "Connecticut"
    example_en: "Connecticut is known for its coastal towns."
    example_es: "Connecticut es conocido por sus pueblos costeros."
    note: "The second c is silent; pronounce it like “kuh-NET-i-kut.”"

  - word: naive
    ipa: "/naɪˈiːv/"
    meaning_es: "ingenuo; inocente"
    example_en: "It was naive to trust the message without checking it."
    example_es: "Fue ingenuo confiar en el mensaje sin revisarlo."
    note: "Pronounce both vowel sounds: /naɪˈiːv/. The final e is sounded here, unlike many English words."

  - word: bourbon
    ipa: "/ˈbɝːbən/"
    meaning_es: "bourbon; whisky estadounidense"
    example_en: "Bourbon is often made in Kentucky."
    example_es: "El bourbon se produce a menudo en Kentucky."
    note: "The second o is reduced to a schwa /ə/; do not pronounce it like “bon.”"

  - word: infamous
    ipa: "/ˈɪnfəməs/"
    meaning_es: "infame; tristemente célebre; de mala fama"
    example_en: "The city became infamous for its traffic jams."
    example_es: "La ciudad se volvió tristemente célebre por sus embotellamientos."
    note: "The second a is reduced to a schwa /ə/; do not pronounce it like the Spanish “a.”"

  - word: focus
    ipa: "/ˈfoʊkəs/"
    meaning_es: "enfoque; concentrarse"
    example_en: "Please focus on the first vowel sound."
    example_es: "Por favor concéntrate en el sonido de la primera vocal."
    note: "Say /foʊ/ with the GOAT vowel. Do not reduce it to /fʌ/ or it can sound like the vulgar phrase “fuck us.”"

  - word: fuck us
    ipa: "/ˈfʌk əs/"
    meaning_es: "frase vulgar: que nos jodan"
    example_en: "Be careful: “focus” should not sound like “fuck us.”"
    example_es: "Ten cuidado: “focus” no debe sonar como “fuck us.”"
    note: "Vulgar phrase. The vowel is /ʌ/ as in STRUT, not /oʊ/ as in “focus.”"

  - word: Doug
    ipa: "/dʌɡ/"
    meaning_es: "Doug; nombre propio masculino"
    example_en: "Doug will join the meeting at noon."
    example_es: "Doug se unirá a la reunión al mediodía."
    note: "Use the /ʌ/ vowel as in “cup.” Do not pronounce it like “dog.”"

  - word: dog
    ipa: "/dɔːɡ/; also /dɑːɡ/ in many American accents"
    meaning_es: "perro"
    example_en: "The dog is sleeping under the table."
    example_es: "El perro está durmiendo debajo de la mesa."
    note: "Use the THOUGHT/PALM vowel, depending on accent. It should not sound like “Doug” /dʌɡ/."

  - word: throughput
    ipa: "/ˈθruːpʊt/"
    meaning_es: "rendimiento; tasa de procesamiento; cantidad procesada por unidad de tiempo"
    example_en: "The new pipeline improved data throughput significantly."
    example_es: "El nuevo pipeline mejoró significativamente el rendimiento de procesamiento de datos."
    note: "The gh in through is silent. Start with /θr/ as in “through,” not /tr/ or /t/. The second syllable sounds like “put” /pʊt/."

  - word: iteratively
    ipa: "/ˈɪtərətɪvli/; also /ˈɪtəreɪtɪvli/"
    meaning_es: "iterativamente; de forma repetida y mejorando paso a paso"
    example_en: "We improved the prompt iteratively after each test."
    example_es: "Mejoramos el prompt iterativamente después de cada prueba."
    note: "Stress the first syllable: /ˈɪt-/. The middle vowels are weak; do not pronounce every written vowel like Spanish."

  - word: sheet
    ipa: "/ʃiːt/"
    meaning_es: "hoja; sábana; hoja de cálculo"
    example_en: "Please update the sheet before the meeting."
    example_es: "Por favor actualiza la hoja antes de la reunión."
    note: "Use the long /iː/ vowel. If you shorten it to /ɪ/, it can sound like the vulgar word “shit” /ʃɪt/."

  - word: shit
    ipa: "/ʃɪt/"
    meaning_es: "mierda; palabra vulgar"
    example_en: "Be careful: “sheet” should not sound like “shit.”"
    example_es: "Ten cuidado: “sheet” no debe sonar como “shit.”"
    note: "Vulgar word. The vowel is short /ɪ/, not long /iː/ as in “sheet.”"

  - word: beach
    ipa: "/biːtʃ/"
    meaning_es: "playa"
    example_en: "We walked along the beach in the morning."
    example_es: "Caminamos por la playa en la mañana."
    note: "Use long /iː/. If you say short /ɪ/, it can sound like the insulting word “bitch” /bɪtʃ/."

  - word: bitch
    ipa: "/bɪtʃ/"
    meaning_es: "insulto vulgar; perra"
    example_en: "Be careful: “beach” should not sound like “bitch.”"
    example_es: "Ten cuidado: “beach” no debe sonar como “bitch.”"
    note: "Vulgar/insulting word. The vowel is short /ɪ/, not long /iː/ as in “beach.”"

  - word: piece
    ipa: "/piːs/"
    meaning_es: "pieza; pedazo"
    example_en: "I need one more piece of information."
    example_es: "Necesito una pieza más de información."
    note: "Use long /iː/ and final /s/. If the vowel becomes short /ɪ/, it can sound like the vulgar word “piss” /pɪs/."

  - word: piss
    ipa: "/pɪs/"
    meaning_es: "orinar; orina; palabra vulgar"
    example_en: "Be careful: “piece” should not sound like “piss.”"
    example_es: "Ten cuidado: “piece” no debe sonar como “piss.”"
    note: "Vulgar word. The vowel is short /ɪ/, not long /iː/ as in “piece” or “peace.”"

  - word: sit
    ipa: "/sɪt/"
    meaning_es: "sentarse"
    example_en: "Please sit near the front."
    example_es: "Por favor siéntate cerca del frente."
